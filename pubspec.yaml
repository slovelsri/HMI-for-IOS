name: hmi_viewer
description: "A kiosk-style viewer for V-Box HMI devices on a local network."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  flutter_inappwebview: ^6.1.5
  shared_preferences: ^2.3.3
  connectivity_plus: ^6.1.0
  wakelock_plus: ^1.2.8
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
